<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>How Fast Can You Count?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

:root{
  --bg:#030810;--nb:#00d4ff;--ng:#00ff88;--nr:#ff2255;--ny:#ffcc00;--np:#cc00ff;
  --p1:#ff3355;--p2:#00aaff;--p3:#ffcc00;--p4:#00ff88;
  --fd:'Orbitron',monospace;--fm:'Share Tech Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:var(--bg);color:#dceeff;font-family:var(--fm);overflow:hidden;touch-action:manipulation;}
.screen{display:none;width:100%;height:100%;position:absolute;inset:0;}
.screen.active{display:flex;}

/* ===== MENU ===== */
#screen-menu{flex-direction:column;align-items:center;overflow-y:auto;padding:14px 13px 28px;gap:11px;background:var(--bg);}
.ttl{text-align:center;}
.ttl h1{font-family:var(--fd);font-size:clamp(16px,5.2vw,29px);font-weight:900;letter-spacing:1px;line-height:1.3;color:#fff;text-shadow:0 0 10px var(--nb),0 0 26px rgba(0,212,255,.3);}
.ttl .sub{font-size:9px;color:rgba(0,212,255,.5);letter-spacing:4px;margin-top:3px;}
.card{background:rgba(0,16,36,.88);border:1px solid rgba(0,212,255,.2);border-radius:9px;padding:13px;width:100%;max-width:480px;}
.ct{font-family:var(--fd);font-size:10px;letter-spacing:3px;color:var(--nb);text-transform:uppercase;margin-bottom:9px;padding-left:7px;border-left:3px solid var(--nb);}
.tg{display:flex;gap:6px;}
.tb{flex:1;padding:8px 5px;background:rgba(0,0,0,.45);border:1px solid rgba(0,212,255,.15);border-radius:6px;color:rgba(170,205,240,.38);font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;text-align:center;line-height:1.4;}
.tb.on{background:rgba(0,212,255,.11);border-color:var(--nb);color:var(--nb);}
.tb.on.cp1{border-color:var(--p1);color:var(--p1);background:rgba(255,51,85,.1);}
.tb.on.cp2{border-color:var(--p2);color:var(--p2);background:rgba(0,170,255,.1);}
.tb.on.cp3{border-color:var(--p3);color:var(--p3);background:rgba(255,204,0,.1);}
.tb.on.cp4{border-color:var(--p4);color:var(--p4);background:rgba(0,255,136,.1);}
.og{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.oc{display:none;}
.ol{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 5px;background:rgba(0,0,0,.4);border:1px solid rgba(0,212,255,.15);border-radius:6px;cursor:pointer;gap:3px;}
.os{font-size:19px;font-family:var(--fd);font-weight:900;color:rgba(170,200,255,.28);}
.on2{font-size:8px;letter-spacing:1px;color:rgba(170,200,255,.2);}
.oc:checked+.ol{background:rgba(0,255,136,.08);border-color:var(--ng);}
.oc:checked+.ol .os{color:var(--ng);}
.oc:checked+.ol .on2{color:rgba(0,255,136,.5);}
.ir{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.ig{display:flex;flex-direction:column;gap:4px;}
.ig label{font-size:9px;letter-spacing:2px;color:rgba(0,212,255,.48);text-transform:uppercase;}
.ci{width:100%;padding:8px 9px;background:rgba(0,0,0,.5);border:1px solid rgba(0,212,255,.2);border-radius:5px;color:var(--nb);font-family:var(--fd);font-size:15px;font-weight:700;text-align:center;outline:none;}
.sbtn{width:100%;max-width:480px;padding:14px;background:rgba(0,90,170,.16);border:2px solid var(--nb);border-radius:8px;color:#fff;font-family:var(--fd);font-size:14px;font-weight:900;letter-spacing:4px;cursor:pointer;text-transform:uppercase;}
.sbtn:active{opacity:.65;}

/* ===== NAME INPUT SCREEN ===== */
#screen-names{background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;}
.names-title{font-family:var(--fd);font-size:12px;letter-spacing:3px;color:var(--nb);text-align:center;}

/* 1p = center, 2p = top+bottom split (top rotated), 3p = top half + bottom-left + bottom-right, 4p = 4 corners */
#names-layout{width:100%;height:85%;position:relative;}

/* Name zone wrapper layouts */
.nly1{display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.nly2{display:flex;flex-direction:column;width:100%;height:100%;}
.nly3{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;width:100%;height:100%;}
.nly4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;width:100%;height:100%;}

.nzone{display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;}
.nly1 .nzone{width:85%;max-width:360px;}
.nly2 .nzone{flex:1;}
/* 2p: first zone = top = rotated */
.nly2 .nzone:nth-child(1){transform:rotate(180deg);border-bottom:2px solid rgba(0,212,255,.15);}
/* 3p: top half spans full width (grid col 1-2), bottom-left, bottom-right */
.nly3 .nzone:nth-child(1){grid-column:span 2;transform:rotate(180deg);border-bottom:1px solid rgba(0,212,255,.12);}
.nly3 .nzone:nth-child(2){border-right:1px solid rgba(0,212,255,.1);}
/* 4p: top row rotated */
.nly4 .nzone:nth-child(1){transform:rotate(180deg);border-right:1px solid rgba(255,51,85,.15);border-bottom:1px solid rgba(255,51,85,.15);}
.nly4 .nzone:nth-child(2){transform:rotate(180deg);border-bottom:1px solid rgba(0,170,255,.15);}
.nly4 .nzone:nth-child(3){border-right:1px solid rgba(255,204,0,.15);}

.npad{width:100%;max-width:280px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.nph{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:3px;padding:3px 9px;border-radius:20px;border:1px solid currentColor;text-transform:uppercase;}
.ndisp{
  font-family:var(--fd);font-size:clamp(16px,5vw,26px);font-weight:900;
  letter-spacing:2px;width:100%;text-align:center;padding:7px 10px;
  background:rgba(0,0,0,.45);border-radius:7px;border:1px solid rgba(255,255,255,.08);color:#fff;
  min-height:1.4em;
}
.ndisp.ready{border-color:rgba(0,255,136,.3);color:var(--ng);}
/* Name keypad: QWERTY-style rows */
.nkb{display:flex;flex-direction:column;gap:3px;width:100%;}
.nkrow{display:flex;justify-content:center;gap:3px;}
.nk{
  flex:1;max-width:34px;height:34px;min-width:0;
  background:rgba(0,7,18,.75);border:1px solid rgba(70,150,210,.12);
  border-radius:5px;color:rgba(185,215,255,.7);font-family:var(--fd);
  font-size:clamp(10px,3vw,13px);font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.nk:active{background:rgba(0,212,255,.15);}
.nk.nksp{flex:3;max-width:120px;font-size:9px;letter-spacing:1px;color:rgba(170,200,255,.5);}
.nk.nkdel{flex:1.5;max-width:50px;font-size:10px;color:var(--nr);border-color:rgba(255,34,85,.22);}
.nk.nkok{flex:2;max-width:70px;font-size:9px;letter-spacing:1px;color:var(--ng);border-color:var(--ng);background:rgba(0,255,136,.08);}
.nk.nkok:active{background:rgba(0,255,136,.22);}
.nk.done-ind{flex:1;max-width:200px;height:auto;padding:6px;font-size:9px;letter-spacing:2px;color:rgba(0,255,136,.45);border-color:rgba(0,255,136,.15);pointer-events:none;}

/* ===== COUNTDOWN ===== */
#screen-countdown{align-items:center;justify-content:center;background:var(--bg);}
#cdn{font-family:var(--fd);font-size:38vw;font-weight:900;color:#fff;text-shadow:0 0 20px var(--nb);will-change:transform,opacity;}
#cdn.go{font-size:22vw;color:var(--ng);text-shadow:0 0 20px var(--ng);}
#cdn.an{animation:cdp .75s ease-out forwards;}
@keyframes cdp{0%{transform:scale(1.55);opacity:0}35%{transform:scale(1);opacity:1}78%{transform:scale(1);opacity:1}100%{transform:scale(.78);opacity:0}}

/* ===== STREAM ===== */
#screen-stream{background:var(--bg);position:relative;}
#si{width:100%;height:100%;display:flex;flex-direction:column;}
.s1w{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
/* 2p & 4p dual */
.sdual{flex:1;display:flex;flex-direction:column;}
.sh-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transform:rotate(180deg);border-bottom:1px solid rgba(0,212,255,.1);}
.sh-bot{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
/* 3p: top full + bottom half */
.s3wrap{flex:1;display:flex;flex-direction:column;}
.s3top{flex:1;display:flex;align-items:center;justify-content:center;position:relative;transform:rotate(180deg);border-bottom:1px solid rgba(0,212,255,.1);}
.s3bot{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
.sc{display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.sop{font-family:var(--fd);font-size:8vw;font-weight:900;color:rgba(170,215,255,.38);line-height:1;min-height:.9em;}
.sn{font-family:var(--fd);font-weight:900;line-height:1;will-change:opacity,transform;}
.sz1{font-size:32vw;}.sz2{font-size:22vw;}.sz3{font-size:22vw;}
.sn.pos{color:var(--ng);text-shadow:0 0 10px rgba(0,255,136,.4);}
.sn.neg{color:var(--nr);text-shadow:0 0 10px rgba(255,34,85,.4);}
.sn.mul{color:var(--ny);text-shadow:0 0 10px rgba(255,204,0,.4);}
.sn.div{color:var(--np);text-shadow:0 0 10px rgba(204,0,255,.4);}
.sn.an{animation:nf .11s ease-out;}
@keyframes nf{0%{opacity:0;transform:scale(1.22)}100%{opacity:1;transform:scale(1)}}
.spw{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);display:flex;gap:3px;}
.pdot{width:6px;height:6px;border-radius:50%;background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.2);}
.pdot.dn{background:var(--nb);}
.sctr{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-family:var(--fd);font-size:10px;color:rgba(0,212,255,.28);letter-spacing:2px;pointer-events:none;white-space:nowrap;}

/* ===== INPUT ===== */
#screen-input{background:var(--bg);}
#il{width:100%;height:100%;}
.ly1{display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.ly2{display:flex;flex-direction:column;width:100%;height:100%;}
.ly3{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;width:100%;height:100%;}
.ly4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;width:100%;height:100%;}
.pz{display:flex;align-items:center;justify-content:center;overflow:hidden;padding:5px;}
.ly1 .pz{width:90%;max-width:390px;}
.ly2 .pz{flex:1;}
.ly2 .pz:nth-child(1){transform:rotate(180deg);border-bottom:2px solid rgba(0,212,255,.15);}
/* 3p: top zone spans full width, rotated */
.ly3 .pz:nth-child(1){grid-column:span 2;transform:rotate(180deg);border-bottom:2px solid rgba(0,212,255,.13);}
.ly3 .pz:nth-child(2){border-right:1px solid rgba(255,204,0,.16);}
/* 4p: top row rotated */
.ly4 .pz:nth-child(1){transform:rotate(180deg);border-right:1px solid rgba(255,51,85,.18);border-bottom:1px solid rgba(255,51,85,.18);}
.ly4 .pz:nth-child(2){transform:rotate(180deg);border-bottom:1px solid rgba(0,170,255,.18);}
.ly4 .pz:nth-child(3){border-right:1px solid rgba(255,204,0,.18);}
.pp{width:100%;display:flex;flex-direction:column;align-items:center;gap:5px;}
.ph{font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid currentColor;}
.pd2{font-family:var(--fd);font-size:clamp(18px,6vw,42px);font-weight:900;letter-spacing:3px;min-height:1.2em;min-width:85px;text-align:center;padding:5px 10px;background:rgba(0,0,0,.45);border-radius:6px;border:1px solid rgba(255,255,255,.07);color:#fff;}
.pd2.done{color:var(--ng);border-color:rgba(0,255,136,.26);opacity:.6;}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:100%;max-width:240px;}
.k{padding:0;aspect-ratio:1.35;background:rgba(0,7,18,.75);border:1px solid rgba(70,150,210,.12);border-radius:5px;color:rgba(185,215,255,.7);font-family:var(--fd);font-size:clamp(12px,3.4vw,18px);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.k:active{background:rgba(0,212,255,.15);}
.kcl{background:rgba(255,34,85,.07)!important;border-color:rgba(255,34,85,.24)!important;color:var(--nr)!important;font-size:clamp(8px,2.2vw,10px)!important;letter-spacing:1px;}
.kneg{background:rgba(255,204,0,.07)!important;border-color:rgba(255,204,0,.24)!important;color:var(--ny)!important;font-size:clamp(10px,2.7vw,14px)!important;}
.kok{grid-column:span 2;aspect-ratio:auto;padding:6px;background:rgba(0,255,136,.09)!important;border-color:var(--ng)!important;color:var(--ng)!important;font-size:clamp(8px,2.2vw,10px)!important;letter-spacing:2px;}
.kok:active{background:rgba(0,255,136,.22)!important;}
.kdone{grid-column:span 3;aspect-ratio:auto;padding:7px;background:rgba(0,255,136,.05)!important;border-color:rgba(0,255,136,.16)!important;color:rgba(0,255,136,.42)!important;font-size:8px;letter-spacing:2px;pointer-events:none;}
.c1{color:var(--p1)}.c2{color:var(--p2)}.c3{color:var(--p3)}.c4{color:var(--p4)}
.b1{border-color:var(--p1)!important}.b2{border-color:var(--p2)!important}.b3{border-color:var(--p3)!important}.b4{border-color:var(--p4)!important}

/* ===== RESULT / DRAMATIC REVEAL ===== */
#screen-result{background:var(--bg);flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
#rank-list{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:18px;z-index:20;}
.rank-row{
  width:100%;max-width:430px;display:flex;align-items:center;gap:11px;
  background:rgba(0,15,35,.85);border:1px solid rgba(0,212,255,.12);
  border-radius:10px;padding:10px 13px;
  opacity:0;transform:translateY(28px);
  transition:opacity .45s ease,transform .45s ease;
}
.rank-row.show{opacity:1;transform:translateY(0);}
.rr-pos{font-family:var(--fd);font-size:clamp(20px,6vw,32px);font-weight:900;width:42px;text-align:center;flex-shrink:0;}
.rr-info{flex:1;display:flex;flex-direction:column;gap:2px;}
.rr-name{font-family:var(--fd);font-size:clamp(10px,3vw,13px);font-weight:700;letter-spacing:1px;}
.rr-sub{font-size:9px;color:rgba(170,200,255,.4);letter-spacing:1px;}
.rr-score{font-family:var(--fd);font-size:clamp(20px,6.5vw,34px);font-weight:900;text-align:right;flex-shrink:0;}
.rr-pts{font-size:8px;letter-spacing:2px;text-align:right;opacity:.45;font-family:var(--fd);}

/* Answer reveal overlay */
#ans-reveal{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;z-index:30;background:rgba(3,8,16,0);opacity:0;pointer-events:none;
  transition:opacity .5s ease,background .5s ease;
}
#ans-reveal.show{opacity:1;pointer-events:auto;background:rgba(3,8,16,.8);}
.ar-lbl{font-family:var(--fd);font-size:10px;letter-spacing:4px;color:rgba(0,212,255,.5);text-transform:uppercase;}
.ar-num{
  font-family:var(--fd);font-size:clamp(52px,18vw,110px);font-weight:900;
  color:#fff;text-shadow:0 0 18px var(--nb),0 0 50px rgba(0,212,255,.3);
  transform:scale(0.2);opacity:0;
  transition:transform .55s cubic-bezier(.18,.89,.32,1.28),opacity .4s ease;
}
#ans-reveal.show .ar-num{transform:scale(1);opacity:1;}
.ar-rmb{
  padding:10px 26px;background:rgba(0,212,255,.1);border:1px solid var(--nb);
  border-radius:7px;color:var(--nb);font-family:var(--fd);font-size:11px;font-weight:700;
  letter-spacing:3px;cursor:pointer;margin-top:8px;
  opacity:0;transition:opacity .4s ease .6s;
}
#ans-reveal.show .ar-rmb{opacity:1;}
.ar-rmb:active{opacity:.6;}

/* ===== WINNER CELEBRATION ===== */
#winner-screen{
  position:fixed;inset:0;z-index:100;
  background:rgba(3,8,16,0);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
  transition:background .4s ease, opacity .4s ease;
}
#winner-screen.show{opacity:1;background:rgba(3,8,16,.92);pointer-events:auto;}

/* Particles canvas */
#confetti-canvas{position:absolute;inset:0;pointer-events:none;}

.winner-inner{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  z-index:2;text-align:center;
}
.win-crown{font-size:clamp(48px,16vw,96px);line-height:1;animation:crownBounce 0.6s cubic-bezier(.18,.89,.32,1.28) forwards;opacity:0;}
@keyframes crownBounce{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}

.win-label{font-family:var(--fd);font-size:clamp(10px,3vw,14px);letter-spacing:4px;color:rgba(255,215,0,.6);text-transform:uppercase;opacity:0;animation:fadeUp .5s ease .3s forwards;}
.win-name{font-family:var(--fd);font-size:clamp(28px,10vw,64px);font-weight:900;color:#FFD700;text-shadow:0 0 20px #FFD700,0 0 50px rgba(255,215,0,.4);opacity:0;animation:fadeUp .5s ease .5s forwards;}
.win-sub{font-family:var(--fd);font-size:clamp(9px,2.5vw,13px);letter-spacing:3px;color:rgba(255,215,0,.5);opacity:0;animation:fadeUp .4s ease .75s forwards;}
.win-score{font-family:var(--fd);font-size:clamp(36px,12vw,72px);font-weight:900;color:#fff;opacity:0;animation:scoreZoom .6s cubic-bezier(.18,.89,.32,1.28) .9s forwards;}
.win-pts{font-family:var(--fd);font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.4);opacity:0;animation:fadeUp .4s ease 1.1s forwards;}

@keyframes fadeUp{0%{opacity:0;transform:translateY(18px)}100%{opacity:1;transform:translateY(0)}}
@keyframes scoreZoom{0%{opacity:0;transform:scale(0.4)}60%{transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}

/* Neon ring pulse behind winner */
.win-ring{
  position:absolute;width:60vw;height:60vw;max-width:320px;max-height:320px;
  border-radius:50%;border:2px solid rgba(255,215,0,.3);
  animation:ringPulse 1.2s ease-out .2s infinite;
  pointer-events:none;
}
.win-ring2{
  position:absolute;width:50vw;height:50vw;max-width:260px;max-height:260px;
  border-radius:50%;border:2px solid rgba(255,215,0,.15);
  animation:ringPulse 1.2s ease-out .5s infinite;
  pointer-events:none;
}
@keyframes ringPulse{0%{transform:scale(0.8);opacity:.8}100%{transform:scale(1.6);opacity:0}}

.win-close{
  margin-top:8px;padding:10px 28px;background:rgba(255,215,0,.12);border:1px solid #FFD700;
  border-radius:8px;color:#FFD700;font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:3px;
  cursor:pointer;opacity:0;animation:fadeUp .4s ease 1.4s forwards;
}
.win-close:active{opacity:.6;}
</style>
</head>
<body>

<!-- MENU -->
<div id="screen-menu" class="screen active">
  <div class="ttl">
    <h1>HOW FAST CAN<br>YOU COUNT?</h1>
    <div class="sub">⚡ cyberpunk math arena ⚡</div>
  </div>
  <div class="card">
    <div class="ct">Jumlah Pemain</div>
    <div class="tg">
      <button class="tb on cp1" data-g="pl" data-v="1">1<br><span style="font-size:8px">SOLO</span></button>
      <button class="tb cp2" data-g="pl" data-v="2">2<br><span style="font-size:8px">VERSUS</span></button>
      <button class="tb cp3" data-g="pl" data-v="3">3<br><span style="font-size:8px">TRIO</span></button>
      <button class="tb cp4" data-g="pl" data-v="4">4<br><span style="font-size:8px">BATTLE</span></button>
    </div>
  </div>
  <div class="card">
    <div class="ct">Difficulty</div>
    <div class="tg">
      <button class="tb on" data-g="df" data-v="1500">EASY<br><span style="font-size:8px;opacity:.55">1.5s</span></button>
      <button class="tb" data-g="df" data-v="1000">MEDIUM<br><span style="font-size:8px;opacity:.55">1.0s</span></button>
      <button class="tb" data-g="df" data-v="600">HARD<br><span style="font-size:8px;opacity:.55">0.6s</span></button>
    </div>
  </div>
  <div class="card">
    <div class="ct">Operator</div>
    <div class="og">
      <div><input type="checkbox" class="oc" id="oa" value="add" checked><label class="ol" for="oa"><span class="os">+</span><span class="on2">PLUS</span></label></div>
      <div><input type="checkbox" class="oc" id="os2" value="sub"><label class="ol" for="os2"><span class="os">−</span><span class="on2">MINUS</span></label></div>
      <div><input type="checkbox" class="oc" id="om" value="mul"><label class="ol" for="om"><span class="os">×</span><span class="on2">KALI</span></label></div>
      <div><input type="checkbox" class="oc" id="od" value="div"><label class="ol" for="od"><span class="os">÷</span><span class="on2">BAGI</span></label></div>
    </div>
  </div>
  <div class="card">
    <div class="ct">Konfigurasi Angka</div>
    <div class="ir">
      <div class="ig"><label>Jumlah Angka</label><input type="number" class="ci" id="inc" value="10" min="3" max="50"></div>
      <div class="ig"><label>Angka Maks (X)</label><input type="number" class="ci" id="imx" value="20" min="2" max="999"></div>
    </div>
  </div>
  <button class="sbtn" id="bstart">▶ MULAI GAME</button>
</div>

<!-- NAME INPUT -->
<div id="screen-names" class="screen">
  <div id="names-layout"></div>
</div>

<!-- COUNTDOWN -->
<div id="screen-countdown" class="screen">
  <div id="cdn">3</div>
</div>

<!-- STREAM -->
<div id="screen-stream" class="screen">
  <div id="si"></div>
</div>

<!-- INPUT -->
<div id="screen-input" class="screen">
  <div id="il"></div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div id="rank-list"></div>
  <div id="ans-reveal">
    <div class="ar-lbl">✦ JAWABAN ASLI ✦</div>
    <div class="ar-num" id="ar-num">0</div>
    <button class="ar-rmb" id="brmb">↺ MAIN LAGI</button>
  </div>
</div>

<!-- WINNER OVERLAY -->
<div id="winner-screen">
  <canvas id="confetti-canvas"></canvas>
  <div class="win-ring"></div>
  <div class="win-ring2"></div>
  <div class="winner-inner" id="winner-inner">
    <div class="win-crown" id="win-crown">👑</div>
    <div class="win-label">PEMENANG GAME</div>
    <div class="win-name" id="win-name">PLAYER</div>
    <div class="win-sub">JUARA 1 · AKURASI TERTINGGI</div>
    <div class="win-score" id="win-score">100</div>
    <div class="win-pts">POIN AKURASI</div>
    <button class="win-close" id="win-close">✓ TUTUP</button>
  </div>
</div>

<script>
var G={players:1,diff:1500,ops:['add'],count:10,maxNum:20,
       seq:[],answer:0,idx:0,stmr:0,
       names:['P1','P2','P3','P4'],
       namesReady:[],
       pans:[]};

/* Player default names & colors */
var PDEF=['P1','P2','P3','P4'];
var PC=['c1','c2','c3','c4'],PB=['b1','b2','b3','b4'];
var PCOLORS=['var(--p1)','var(--p2)','var(--p3)','var(--p4)'];
var OM={add:'+',sub:'−',mul:'×',div:'÷'};

function gid(id){return document.getElementById(id);}
function showScr(id){
  var s=document.querySelectorAll('.screen');
  for(var i=0;i<s.length;i++) s[i].classList.remove('active');
  gid('screen-'+id).classList.add('active');
}
function tap(el,fn){
  if(!el) return;
  var t=false;
  el.addEventListener('touchstart',function(e){e.preventDefault();t=true;fn();},{passive:false});
  el.addEventListener('click',function(){if(t){t=false;return;}fn();});
}

/* ===== MENU ===== */
var tbs=document.querySelectorAll('.tb[data-g]');
for(var i=0;i<tbs.length;i++){(function(b){
  tap(b,function(){
    var g=b.getAttribute('data-g'),v=b.getAttribute('data-v');
    var all=document.querySelectorAll('.tb[data-g="'+g+'"]');
    for(var j=0;j<all.length;j++) all[j].classList.remove('on');
    b.classList.add('on');
    if(g==='pl') G.players=parseInt(v);
    if(g==='df') G.diff=parseInt(v);
  });
})(tbs[i]);}

tap(gid('bstart'),function(){
  var ops=[],cs=document.querySelectorAll('.oc:checked');
  for(var i=0;i<cs.length;i++) ops.push(cs[i].value);
  if(!ops.length){alert('Pilih minimal 1 operator!');return;}
  G.ops=ops;
  G.count=Math.max(3,Math.min(50,parseInt(gid('inc').value)||10));
  G.maxNum=Math.max(2,Math.min(999,parseInt(gid('imx').value)||20));
  G.names=PDEF.slice();
  startNameInput();
});

/* ===== NAME INPUT ===== */
var KB_ROWS=[
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Z','X','C','V','B','N','M']
];

function startNameInput(){
  showScr('names');
  var n=G.players;
  G.namesReady=[];
  for(var i=0;i<n;i++) G.namesReady.push(false);
  G.names=[];
  for(var i=0;i<n;i++) G.names.push('');

  var nl=gid('names-layout');
  nl.innerHTML='';
  nl.style.cssText='width:100%;height:100%;';

  /*
    Layout for name input:
    1p → center
    2p → top (rotated) + bottom (normal)
    3p → top spanning full width (rotated) + bottom-left + bottom-right (normal)
    4p → 4 corners, top row rotated
  */
  var w=document.createElement('div');
  w.className='nly'+n;
  w.style.cssText='width:100%;height:100%;';

  /* Player zone order — same as input/result:
     - Zones at top of screen get rotate(180deg) via CSS nth-child rules
     1p: [P1]
     2p: [P1 top rotated] [P2 bottom]
     3p: [P1 top full-width rotated] [P2 bottom-left] [P3 bottom-right]
     4p: [P1 top-left rotated] [P2 top-right rotated] [P3 bottom-left] [P4 bottom-right]
  */
  for(var i=0;i<n;i++){
    var z=document.createElement('div');
    z.className='nzone';
    z.innerHTML=mkNamePad(i);
    w.appendChild(z);
  }
  nl.appendChild(w);
  bindNameKeys();
}

function mkNamePad(p){
  var cc=PC[p],bc=PB[p];
  var rows='';
  for(var r=0;r<KB_ROWS.length;r++){
    rows+='<div class="nkrow">';
    for(var c=0;c<KB_ROWS[r].length;c++){
      rows+='<button class="nk" data-np="'+p+'" data-ch="'+KB_ROWS[r][c]+'">'+KB_ROWS[r][c]+'</button>';
    }
    rows+='</div>';
  }
  rows+='<div class="nkrow">'+
    '<button class="nk nksp" data-np="'+p+'" data-a="sp">SPASI</button>'+
    '<button class="nk nkdel" data-np="'+p+'" data-a="del">⌫</button>'+
    '<button class="nk nkok '+bc+'" data-np="'+p+'" data-a="ok">SIAP!</button>'+
  '</div>';
  return '<div class="npad" id="npad'+p+'">'+
    '<div class="nph '+cc+' '+bc+'">NAMA PEMAIN '+(p+1)+'</div>'+
    '<div class="ndisp" id="ndisp'+p+'">_</div>'+
    '<div class="nkb" id="nkb'+p+'">'+rows+'</div>'+
  '</div>';
}

function bindNameKeys(){
  var ks=document.querySelectorAll('.nk[data-np]');
  for(var i=0;i<ks.length;i++){(function(b){
    tap(b,function(){
      var p=parseInt(b.getAttribute('data-np'));
      if(G.namesReady[p]) return;
      var a=b.getAttribute('data-a'),ch=b.getAttribute('data-ch');
      if(ch){if(G.names[p].length<12) G.names[p]+=ch;}
      else if(a==='sp'){if(G.names[p].length<12) G.names[p]+=' ';}
      else if(a==='del'){G.names[p]=G.names[p].slice(0,-1);}
      else if(a==='ok'){
        var nm=G.names[p].trim();
        if(!nm) nm=PDEF[p];
        G.names[p]=nm;
        G.namesReady[p]=true;
        var d=gid('ndisp'+p);if(d){d.textContent=nm;d.classList.add('ready');}
        var kb=gid('nkb'+p);if(kb) kb.innerHTML='<div class="nkrow"><div class="nk done-ind">✓ SIAP!</div></div>';
        checkAllNamesReady();
        return;
      }
      var d=gid('ndisp'+p);if(d) d.textContent=G.names[p]||'_';
    });
  })(ks[i]);}
}

function checkAllNamesReady(){
  for(var i=0;i<G.players;i++) if(!G.namesReady[i]) return;
  // All ready — short pause then start
  setTimeout(function(){mkSeq();runCD();},400);
}

/* ===== SEQUENCE ===== */
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function mkSeq(){
  var ops=G.ops,mx=G.maxNum,n=G.count,seq=[],run=0;
  for(var i=0;i<n;i++){
    var op=ops[Math.floor(Math.random()*ops.length)],num;
    if(i===0) op='add';
    if(op==='div'){
      if(run!==0){
        var dv=[];
        for(var d=1;d<=Math.min(Math.abs(run),mx);d++) if(run%d===0) dv.push(d);
        num=dv.length?dv[Math.floor(Math.random()*dv.length)]:1;
        run=run/num;
      } else {op='add';num=rnd(1,mx);run+=num;}
    } else {
      num=rnd(1,mx);
      if(op==='add') run+=num;
      else if(op==='sub') run-=num;
      else if(op==='mul') run*=num;
    }
    seq.push({op:op,num:num,sym:OM[op]});
  }
  G.seq=seq;G.answer=run;
}

/* ===== COUNTDOWN ===== */
function runCD(){
  showScr('countdown');
  var el=gid('cdn'),n=3;
  function tick(){
    el.className='';
    if(n>0){el.textContent=n;void el.offsetWidth;el.className='an';n--;G.stmr=setTimeout(tick,820);}
    else{el.textContent='GO!';el.className='go an';G.stmr=setTimeout(startStream,820);}
  }
  tick();
}

/* ===== STREAM ===== */
function startStream(){
  showScr('stream');G.idx=0;
  var si=gid('si'),n=G.players,len=G.seq.length;
  si.innerHTML='';si.style.cssText='width:100%;height:100%;display:flex;flex-direction:column;';

  if(n===1){
    si.innerHTML=
      '<div class="s1w">'+
        '<div class="sc"><div class="sop" id="sop0"></div><div class="sn sz1" id="sn0">0</div></div>'+
        '<div class="spw" id="spw0"></div>'+
        '<div class="sctr" id="sctr">1 / '+len+'</div>'+
      '</div>';
    mkDots(['spw0'],len);
  } else if(n===2||n===4){
    si.innerHTML=
      '<div class="sdual" style="flex:1;display:flex;flex-direction:column;">'+
        '<div class="sh-top">'+
          '<div class="sc"><div class="sop" id="sop-t"></div><div class="sn sz2" id="sn-t">0</div></div>'+
          '<div class="spw" id="spw-t"></div>'+
        '</div>'+
        '<div class="sh-bot">'+
          '<div class="sc"><div class="sop" id="sop-b"></div><div class="sn sz2" id="sn-b">0</div></div>'+
          '<div class="spw" id="spw-b"></div>'+
          '<div class="sctr" id="sctr">1 / '+len+'</div>'+
        '</div>'+
      '</div>';
    mkDots(['spw-t','spw-b'],len);
  } else { /* n===3 */
    si.innerHTML=
      '<div class="s3wrap" style="flex:1;display:flex;flex-direction:column;">'+
        '<div class="s3top">'+
          '<div class="sc"><div class="sop" id="sop-t"></div><div class="sn sz3" id="sn-t">0</div></div>'+
          '<div class="spw" id="spw-t"></div>'+
        '</div>'+
        '<div class="s3bot">'+
          '<div class="sc"><div class="sop" id="sop-b"></div><div class="sn sz3" id="sn-b">0</div></div>'+
          '<div class="spw" id="spw-b"></div>'+
          '<div class="sctr" id="sctr">1 / '+len+'</div>'+
        '</div>'+
      '</div>';
    mkDots(['spw-t','spw-b'],len);
  }
  showNext();
}

function mkDots(ids,len){
  for(var k=0;k<ids.length;k++){
    var p=gid(ids[k]);if(!p)continue;p.innerHTML='';
    for(var i=0;i<len;i++){
      var d=document.createElement('div');d.className='pdot';d.id=ids[k]+'-d'+i;p.appendChild(d);
    }
  }
}
function dotOn(pid,idx){var d=gid(pid+'-d'+idx);if(d)d.classList.add('dn');}

function setEl(nid,oid,item,idx,sz){
  var ne=gid(nid),oe=gid(oid);if(!ne||!oe)return;
  oe.textContent=idx===0?'':item.sym;
  ne.textContent=String(item.num);
  var c='sn '+sz+' '+(item.op==='add'?'pos':item.op==='sub'?'neg':item.op==='mul'?'mul':'div');
  ne.className=c;ne.classList.remove('an');void ne.offsetWidth;ne.classList.add('an');
}

function showNext(){
  var idx=G.idx;
  if(idx>=G.seq.length){clearTimeout(G.stmr);setTimeout(startInput,250);return;}
  var item=G.seq[idx],n=G.players;
  if(n===1){
    setEl('sn0','sop0',item,idx,'sz1');dotOn('spw0',idx);
  } else {
    setEl('sn-b','sop-b',item,idx,n===3?'sz3':'sz2');dotOn('spw-b',idx);
    setEl('sn-t','sop-t',item,idx,n===3?'sz3':'sz2');dotOn('spw-t',idx);
  }
  var ctr=gid('sctr');if(ctr) ctr.textContent=(idx+1)+' / '+G.seq.length;
  G.idx++;G.stmr=setTimeout(showNext,G.diff);
}

/* ===== INPUT ===== */
function startInput(){
  showScr('input');
  var now=performance.now();G.pans=[];
  for(var i=0;i<G.players;i++) G.pans.push({val:'',neg:false,submitted:false,time:0,t0:now,fv:0});
  buildInputUI();
}

function buildInputUI(){
  var il=gid('il');il.innerHTML='';
  var n=G.players,w=document.createElement('div');
  w.className='ly'+n;w.style.cssText='width:100%;height:100%;';
  for(var i=0;i<n;i++){
    var z=document.createElement('div');z.className='pz';z.innerHTML=mkPad(i);w.appendChild(z);
  }
  il.appendChild(w);bindKeys();
}

function mkPad(p){
  var cc=PC[p],bc=PB[p],nm=G.names[p]||PDEF[p];
  var rows='';var nums=[7,8,9,4,5,6,1,2,3];
  for(var i=0;i<nums.length;i++) rows+='<button class="k" data-p="'+p+'" data-v="'+nums[i]+'">'+nums[i]+'</button>';
  return '<div class="pp" id="pp'+p+'">'+
    '<div class="ph '+cc+' '+bc+'">'+nm+'</div>'+
    '<div class="pd2" id="pd'+p+'">0</div>'+
    '<div class="kp" id="kp'+p+'">'+rows+
      '<button class="k kcl" data-p="'+p+'" data-a="cl">CLR</button>'+
      '<button class="k" data-p="'+p+'" data-v="0">0</button>'+
      '<button class="k kneg" data-p="'+p+'" data-a="neg">+/−</button>'+
      '<button class="k kok '+bc+'" data-p="'+p+'" data-a="ok">✓ OK</button>'+
    '</div></div>';
}

function bindKeys(){
  var ks=document.querySelectorAll('.k[data-p]');
  for(var i=0;i<ks.length;i++){(function(b){
    tap(b,function(){
      var p=parseInt(b.getAttribute('data-p'));
      if(G.pans[p].submitted)return;
      var a=b.getAttribute('data-a'),v=b.getAttribute('data-v');
      if(v!==null){if(G.pans[p].val.length<7) G.pans[p].val+=v;}
      else if(a==='cl'){G.pans[p].val=G.pans[p].val.slice(0,-1);}
      else if(a==='neg'){G.pans[p].neg=!G.pans[p].neg;}
      else if(a==='ok'){doSubmit(p);return;}
      updDisp(p);
    });
  })(ks[i]);}
}

function updDisp(p){
  var d=gid('pd'+p);if(!d)return;
  d.textContent=(G.pans[p].neg?'-':'')+(G.pans[p].val||'0');
}

function doSubmit(p){
  var pa=G.pans[p];if(pa.submitted)return;
  var raw=(pa.neg?'-':'')+pa.val;
  if(!raw||raw==='-') raw='0';
  pa.fv=parseInt(raw)||0;pa.submitted=true;pa.time=performance.now()-pa.t0;
  var d=gid('pd'+p);if(d){d.textContent=String(pa.fv);d.classList.add('done');}
  var kp=gid('kp'+p);if(kp) kp.innerHTML='<div class="k kdone">✓ SUBMITTED</div>';
  var all=true;
  for(var i=0;i<G.players;i++) if(!G.pans[i].submitted){all=false;break;}
  if(all) setTimeout(showResults,320);
}

/* ===== RESULTS ===== */
var RKLAB=['🥇 JUARA 1','🥈 JUARA 2','🥉 JUARA 3','4️⃣ JUARA 4'];
var RKCOL=['#FFD700','#C0C0C0','#cd7f32','rgba(170,200,255,.3)'];
var RKBCOL=['rgba(255,215,0,.3)','rgba(192,192,192,.25)','rgba(205,127,50,.25)','rgba(170,200,255,.12)'];

function showResults(){
  showScr('result');
  // Reset ans-reveal
  var ar=gid('ans-reveal');ar.classList.remove('show');
  var ws=gid('winner-screen');ws.classList.remove('show');

  var ans=G.answer,n=G.players,sc=[];
  for(var i=0;i<n;i++){
    var pa=G.pans[i];
    var diff=Math.abs(ans-pa.fv);
    sc.push({pi:i,val:pa.fv,acc:Math.max(0,100-diff),time:pa.time,ts:(pa.time/1000).toFixed(2)});
  }
  // Sort best→worst
  var sorted=sc.slice().sort(function(a,b){return b.acc!==a.acc?b.acc-a.acc:a.time-b.time;});

  var rl=gid('rank-list');rl.innerHTML='';
  var rows=[];
  for(var r=0;r<sorted.length;r++){
    var s=sorted[r];
    var pColor=PCOLORS[s.pi];
    var rkColor=RKCOL[r];
    var rkBg=RKBCOL[r];
    var scColor=s.acc>=95?'var(--ng)':s.acc>=70?'var(--nb)':'var(--nr)';
    var row=document.createElement('div');row.className='rank-row';
    row.style.borderColor=rkBg;
    row.innerHTML=
      '<div class="rr-pos" style="color:'+rkColor+'">'+RKLAB[r].split(' ')[0]+'</div>'+
      '<div class="rr-info">'+
        '<div class="rr-name" style="color:'+pColor+'">'+G.names[s.pi]+'</div>'+
        '<div class="rr-sub" style="color:'+rkColor+';opacity:.7">'+RKLAB[r].replace(/^\S+ /,'')+'</div>'+
        '<div class="rr-sub">Jawaban: <b style="color:rgba(220,238,255,.75)">'+s.val+'</b> &nbsp;·&nbsp; Waktu: <b style="color:rgba(220,238,255,.6)">'+s.ts+'s</b></div>'+
      '</div>'+
      '<div style="display:flex;flex-direction:column;align-items:flex-end;">'+
        '<div class="rr-score" style="color:'+scColor+'">'+s.acc+'</div>'+
        '<div class="rr-pts" style="color:'+scColor+'">POIN</div>'+
      '</div>';
    rows.push(row);
    rl.appendChild(row);
  }

  // Reveal from WORST (last index) to BEST (0), 1.5s between each
  var totalRows=rows.length;
  function revealRow(i){
    if(i<0){
      // All revealed → wait 2s then show answer
      setTimeout(revealAnswer,2000);
      return;
    }
    setTimeout(function(){
      rows[i].classList.add('show');
      revealRow(i-1);
    },1500);
  }
  revealRow(totalRows-1);

  // winner stored for later
  G.winner=sorted[0];

  tap(gid('brmb'),function(){
    gid('ans-reveal').classList.remove('show');
    gid('winner-screen').classList.remove('show');
    stopConfetti();
    showScr('menu');
  });
  tap(gid('win-close'),function(){
    gid('winner-screen').classList.remove('show');
    stopConfetti();
  });
}

function revealAnswer(){
  var ar=gid('ans-reveal');
  gid('ar-num').textContent=String(G.answer);
  ar.classList.add('show');
  // 1 second after answer reveal → winner celebration
  setTimeout(showWinner,1000);
}

/* ===== WINNER CELEBRATION ===== */
var confettiRAF=null,confettiParticles=[];

function showWinner(){
  var w=G.winner;
  gid('win-name').textContent=G.names[w.pi];
  gid('win-score').textContent=w.acc;
  // Re-trigger crown animation
  var crown=gid('win-crown');
  crown.style.animation='none';void crown.offsetWidth;crown.style.animation='crownBounce 0.6s cubic-bezier(.18,.89,.32,1.28) forwards';
  var ws=gid('winner-screen');ws.classList.add('show');
  startConfetti();
}

/* Confetti */
function startConfetti(){
  var canvas=gid('confetti-canvas');
  var W=window.innerWidth,H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');
  confettiParticles=[];
  var COLS=['#FFD700','#ff3355','#00d4ff','#00ff88','#cc00ff','#ffcc00','#ff88cc'];
  for(var i=0;i<90;i++){
    confettiParticles.push({
      x:Math.random()*W,y:Math.random()*H-H,
      vx:(Math.random()-0.5)*3,vy:Math.random()*3+1.5,
      size:Math.random()*7+3,
      color:COLS[Math.floor(Math.random()*COLS.length)],
      rot:Math.random()*360,vr:(Math.random()-0.5)*6,
      shape:Math.random()>0.5?'rect':'circle'
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    var alive=false;
    for(var i=0;i<confettiParticles.length;i++){
      var p=confettiParticles[i];
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.04;
      if(p.y<H+20) alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.globalAlpha=0.85;
      if(p.shape==='rect'){ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}
      else{ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    }
    if(alive) confettiRAF=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,W,H);
  }
  confettiRAF=requestAnimationFrame(draw);
}

function stopConfetti(){
  if(confettiRAF){cancelAnimationFrame(confettiRAF);confettiRAF=null;}
  var canvas=gid('confetti-canvas');
  if(canvas){var ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);}
}

showScr('menu');
</script>
