<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>How Fast Can You Count?</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --card-bg: rgba(0,20,40,0.6);
    --neon-blue: #00d4ff;
    --neon-green: #00ff88;
    --neon-red: #ff2255;
    --neon-yellow: #ffcc00;
    --neon-purple: #cc00ff;
    --p1-color: #ff3355;
    --p2-color: #00aaff;
    --p3-color: #ffcc00;
    --p4-color: #00ff88;
    --border: rgba(0,212,255,0.3);
    --glow: 0 0 20px rgba(0,212,255,0.4), 0 0 40px rgba(0,212,255,0.15);
    --font-display: 'Orbitron', monospace;
    --font-mono: 'Share Tech Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: #e0f0ff;
    font-family: var(--font-mono);
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ===== SCANLINE OVERLAY ===== */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none; z-index: 9999;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; width: 100%; height: 100%; position: absolute; inset: 0; }
  .screen.active { display: flex; }

  /* ===== MENU SCREEN ===== */
  #screen-menu {
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    padding: 20px 16px 30px;
    gap: 16px;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(204,0,255,0.06) 0%, transparent 50%),
      var(--bg);
  }

  .game-title {
    text-align: center;
    padding-top: 8px;
  }

  .game-title h1 {
    font-family: var(--font-display);
    font-size: clamp(18px, 5vw, 32px);
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1.2;
    color: #fff;
    text-shadow:
      0 0 10px var(--neon-blue),
      0 0 25px var(--neon-blue),
      0 0 50px rgba(0,212,255,0.5);
    animation: titlePulse 2.5s ease-in-out infinite;
  }

  .game-title .subtitle {
    font-size: 11px;
    color: rgba(0,212,255,0.6);
    letter-spacing: 4px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 10px var(--neon-blue), 0 0 25px var(--neon-blue), 0 0 50px rgba(0,212,255,0.5); }
    50% { text-shadow: 0 0 20px var(--neon-blue), 0 0 45px var(--neon-blue), 0 0 80px rgba(0,212,255,0.7), 0 0 120px rgba(0,212,255,0.3); }
  }

  .card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    width: 100%;
    max-width: 500px;
    box-shadow: var(--glow);
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--neon-blue);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    display: block;
    width: 3px; height: 14px;
    background: var(--neon-blue);
    box-shadow: 0 0 8px var(--neon-blue);
    border-radius: 2px;
  }

  /* Toggle buttons */
  .toggle-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .toggle-btn {
    flex: 1;
    min-width: 60px;
    padding: 10px 8px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    color: rgba(200,230,255,0.5);
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .toggle-btn.active {
    background: rgba(0,212,255,0.15);
    border-color: var(--neon-blue);
    color: var(--neon-blue);
    box-shadow: 0 0 12px rgba(0,212,255,0.3), inset 0 0 8px rgba(0,212,255,0.1);
  }

  .toggle-btn.p1.active { border-color: var(--p1-color); color: var(--p1-color); background: rgba(255,51,85,0.15); box-shadow: 0 0 12px rgba(255,51,85,0.3); }
  .toggle-btn.p2.active { border-color: var(--p2-color); color: var(--p2-color); background: rgba(0,170,255,0.15); box-shadow: 0 0 12px rgba(0,170,255,0.3); }
  .toggle-btn.p4.active { border-color: var(--neon-green); color: var(--neon-green); background: rgba(0,255,136,0.15); box-shadow: 0 0 12px rgba(0,255,136,0.3); }

  /* Checkbox operators */
  .op-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .op-check { display: none; }

  .op-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    gap: 4px;
  }

  .op-symbol {
    font-size: 22px;
    font-family: var(--font-display);
    font-weight: 900;
    color: rgba(200,230,255,0.4);
    transition: all 0.2s;
  }

  .op-name {
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(200,230,255,0.3);
    transition: all 0.2s;
  }

  .op-check:checked + .op-label {
    background: rgba(0,255,136,0.12);
    border-color: var(--neon-green);
    box-shadow: 0 0 12px rgba(0,255,136,0.2);
  }

  .op-check:checked + .op-label .op-symbol { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
  .op-check:checked + .op-label .op-name { color: rgba(0,255,136,0.7); }

  /* Number inputs */
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-group label {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,212,255,0.6);
    text-transform: uppercase;
  }

  .cyber-input {
    width: 100%;
    padding: 10px 12px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 6px;
    color: var(--neon-blue);
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    outline: none;
    transition: all 0.2s;
  }

  .cyber-input:focus {
    border-color: var(--neon-blue);
    box-shadow: 0 0 12px rgba(0,212,255,0.3);
  }

  /* START BUTTON */
  .start-btn {
    width: 100%;
    max-width: 500px;
    padding: 16px;
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,100,200,0.2));
    border: 2px solid var(--neon-blue);
    border-radius: 10px;
    color: #fff;
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,212,255,0.4), 0 0 40px rgba(0,212,255,0.2);
    transition: all 0.2s;
    animation: startPulse 2s ease-in-out infinite;
  }

  .start-btn:active {
    transform: scale(0.97);
    box-shadow: 0 0 30px rgba(0,212,255,0.6);
  }

  @keyframes startPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.4), 0 0 40px rgba(0,212,255,0.2); }
    50% { box-shadow: 0 0 30px rgba(0,212,255,0.6), 0 0 60px rgba(0,212,255,0.3); }
  }

  /* ===== COUNTDOWN SCREEN ===== */
  #screen-countdown {
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }

  .countdown-number {
    font-family: var(--font-display);
    font-size: 35vw;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px var(--neon-blue), 0 0 80px rgba(0,212,255,0.5);
    animation: countAnim 0.8s ease-out;
  }

  .countdown-number.go {
    font-size: 20vw;
    color: var(--neon-green);
    text-shadow: 0 0 30px var(--neon-green), 0 0 80px rgba(0,255,136,0.5);
  }

  @keyframes countAnim {
    0% { transform: scale(2); opacity: 0; }
    40% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; transform: scale(1); }
    100% { transform: scale(0.8); opacity: 0; }
  }

  /* ===== STREAM SCREEN ===== */
  #screen-stream {
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  .stream-progress {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 10;
  }

  .progress-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(0,212,255,0.2);
    border: 1px solid rgba(0,212,255,0.3);
    transition: all 0.3s;
  }

  .progress-dot.done {
    background: var(--neon-blue);
    box-shadow: 0 0 6px var(--neon-blue);
  }

  .stream-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .stream-operator {
    font-family: var(--font-display);
    font-size: 10vw;
    font-weight: 900;
    color: rgba(200,230,255,0.5);
    line-height: 1;
    margin-bottom: -1vw;
  }

  .stream-number {
    font-family: var(--font-display);
    font-size: 28vw;
    font-weight: 900;
    line-height: 1;
    animation: streamFade 0.15s ease-out;
  }

  .stream-number.positive {
    color: var(--neon-green);
    text-shadow: 0 0 20px var(--neon-green), 0 0 60px rgba(0,255,136,0.4);
  }

  .stream-number.negative {
    color: var(--neon-red);
    text-shadow: 0 0 20px var(--neon-red), 0 0 60px rgba(255,34,85,0.4);
  }

  .stream-number.multiply {
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow), 0 0 60px rgba(255,204,0,0.4);
  }

  .stream-number.divide {
    color: var(--neon-purple);
    text-shadow: 0 0 20px var(--neon-purple), 0 0 60px rgba(204,0,255,0.4);
  }

  @keyframes streamFade {
    0% { opacity: 0; transform: scale(1.3); }
    100% { opacity: 1; transform: scale(1); }
  }

  .stream-counter {
    position: absolute;
    bottom: 20px;
    font-family: var(--font-display);
    font-size: 14px;
    color: rgba(0,212,255,0.4);
    letter-spacing: 2px;
  }

  /* ===== INPUT SCREEN ===== */
  #screen-input {
    position: relative;
    background: var(--bg);
  }

  /* 1 player */
  .layout-1 {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%; height: 100%;
  }

  .layout-1 .player-zone { width: 90%; max-width: 420px; }

  /* 2 players - split horizontal */
  .layout-2 {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
  }

  .layout-2 .player-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .layout-2 .player-zone:first-child {
    border-bottom: 2px solid rgba(0,212,255,0.2);
    transform: rotate(180deg);
  }

  /* 4 players - 4 corners */
  .layout-4 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100%; height: 100%;
  }

  .layout-4 .player-zone {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    overflow: hidden;
  }

  .layout-4 .player-zone:nth-child(1) { border-right: 1px solid rgba(255,51,85,0.2); border-bottom: 1px solid rgba(255,51,85,0.2); } /* P1 bottom-left */
  .layout-4 .player-zone:nth-child(2) { border-left: 1px solid rgba(0,170,255,0.2); border-bottom: 1px solid rgba(0,170,255,0.2); } /* P2 bottom-right */
  .layout-4 .player-zone:nth-child(3) { border-right: 1px solid rgba(255,204,0,0.2); border-top: 1px solid rgba(255,204,0,0.2); transform: rotate(180deg); } /* P3 top-left */
  .layout-4 .player-zone:nth-child(4) { border-left: 1px solid rgba(0,255,136,0.2); border-top: 1px solid rgba(0,255,136,0.2); transform: rotate(180deg); } /* P4 top-right */

  /* Player zone inner */
  .player-pad {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .player-header {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid currentColor;
  }

  .player-display {
    font-family: var(--font-display);
    font-size: clamp(24px, 8vw, 52px);
    font-weight: 900;
    letter-spacing: 4px;
    min-height: 1.2em;
    min-width: 120px;
    text-align: center;
    padding: 8px 16px;
    background: rgba(0,0,0,0.4);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
  }

  .player-display.submitted {
    opacity: 0.5;
    border-color: rgba(0,255,136,0.4);
    color: var(--neon-green);
  }

  /* Keypad */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    width: 100%;
    max-width: 280px;
  }

  .key {
    padding: 0;
    aspect-ratio: 1.4;
    background: rgba(0,10,25,0.7);
    border: 1px solid rgba(100,180,255,0.15);
    border-radius: 6px;
    color: rgba(200,230,255,0.8);
    font-family: var(--font-display);
    font-size: clamp(14px, 4vw, 22px);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .key:active { transform: scale(0.9); background: rgba(0,212,255,0.2); }

  .key.key-clear {
    background: rgba(255,34,85,0.1);
    border-color: rgba(255,34,85,0.3);
    color: var(--neon-red);
    font-size: clamp(9px, 2.5vw, 13px);
    letter-spacing: 1px;
  }

  .key.key-submit {
    grid-column: span 2;
    aspect-ratio: auto;
    padding: 8px;
    background: rgba(0,255,136,0.12);
    border-color: var(--neon-green);
    color: var(--neon-green);
    font-size: clamp(9px, 2.5vw, 13px);
    letter-spacing: 2px;
    box-shadow: 0 0 10px rgba(0,255,136,0.2);
  }

  .key.key-submit:active { background: rgba(0,255,136,0.3); transform: scale(0.97); }

  .key.submitted-indicator {
    grid-column: span 3;
    aspect-ratio: auto;
    padding: 10px;
    background: rgba(0,255,136,0.08);
    border-color: rgba(0,255,136,0.3);
    color: rgba(0,255,136,0.6);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: default;
    pointer-events: none;
  }

  /* Player color themes */
  .p1 { color: var(--p1-color); }
  .p2 { color: var(--p2-color); }
  .p3 { color: var(--p3-color); }
  .p4 { color: var(--p4-color); }

  .p1-border { border-color: var(--p1-color) !important; }
  .p2-border { border-color: var(--p2-color) !important; }
  .p3-border { border-color: var(--p3-color) !important; }
  .p4-border { border-color: var(--p4-color) !important; }

  /* ===== RESULT SCREEN ===== */
  #screen-result {
    position: relative;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(0,212,255,0.05) 0%, transparent 60%),
      var(--bg);
  }

  .result-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .result-label {
    font-family: var(--font-display);
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,212,255,0.5);
    text-transform: uppercase;
  }

  .result-answer {
    font-family: var(--font-display);
    font-size: clamp(28px, 10vw, 56px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px var(--neon-blue), 0 0 50px rgba(0,212,255,0.4);
    animation: resultReveal 0.5s ease-out;
  }

  @keyframes resultReveal {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }

  .rematch-btn {
    padding: 12px 28px;
    background: rgba(0,212,255,0.1);
    border: 1px solid var(--neon-blue);
    border-radius: 8px;
    color: var(--neon-blue);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .rematch-btn:active { transform: scale(0.95); background: rgba(0,212,255,0.25); }

  /* Result layout - 1 player */
  .result-1 {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%; height: 100%;
  }

  .result-1 .result-player-card { width: 80%; max-width: 360px; }

  /* Result layout - 2 player */
  .result-2 {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
  }

  .result-2 .result-player-card:first-child {
    transform: rotate(180deg);
    border-bottom: 2px solid rgba(0,212,255,0.15);
  }

  /* Result layout - 4 player */
  .result-4 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100%; height: 100%;
  }

  .result-4 .result-player-card:nth-child(3),
  .result-4 .result-player-card:nth-child(4) {
    transform: rotate(180deg);
  }

  /* Player result card */
  .result-player-card {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }

  .result-player-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
  }

  .rank-badge {
    font-family: var(--font-display);
    font-size: clamp(9px, 2.5vw, 13px);
    font-weight: 900;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 2px solid currentColor;
    animation: rankGlow 1.5s ease-in-out infinite;
  }

  .rank-badge.rank-1 { color: #FFD700; border-color: #FFD700; text-shadow: 0 0 10px #FFD700; }
  .rank-badge.rank-2 { color: #C0C0C0; border-color: #C0C0C0; }
  .rank-badge.rank-3 { color: #CD7F32; border-color: #CD7F32; }
  .rank-badge.rank-4 { color: rgba(200,230,255,0.4); border-color: rgba(200,230,255,0.2); }

  @keyframes rankGlow {
    0%, 100% { box-shadow: 0 0 8px currentColor; }
    50% { box-shadow: 0 0 16px currentColor, 0 0 30px currentColor; }
  }

  .result-stat {
    font-size: clamp(9px, 2vw, 11px);
    color: rgba(200,230,255,0.5);
    letter-spacing: 1px;
  }

  .result-stat span {
    color: rgba(200,230,255,0.9);
    font-family: var(--font-display);
    font-weight: 700;
  }

  .result-score-big {
    font-family: var(--font-display);
    font-size: clamp(22px, 7vw, 40px);
    font-weight: 900;
  }

  .score-perfect { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
  .score-good { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
  .score-bad { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }

  /* Dividers for result-4 */
  .result-4 .result-player-card:nth-child(1) { border-right: 1px solid rgba(255,255,255,0.08); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .result-4 .result-player-card:nth-child(2) { border-bottom: 1px solid rgba(255,255,255,0.08); }
  .result-4 .result-player-card:nth-child(3) { border-right: 1px solid rgba(255,255,255,0.08); }

  /* ===== UTILITIES ===== */
  .hidden { display: none !important; }

  .glitch-text {
